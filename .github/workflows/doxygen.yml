name: Doxygen Documentation

on:
  workflow_dispatch:          # manual trigger via GitHub UI
  push:
    tags: ['v*']              # automatic on version tags like v2.1.0

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Doxygen and Graphviz
        # pin doxygen to the same release we use locally - apt would install 1.9.8,
        # which generates markedly different HTML and breaks the custom header
        env:
          DOXYGEN_VERSION: 1.17.0
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz
          # unpack outside the checkout - the doc build scans the whole source tree
          curl -fsSL https://www.doxygen.nl/files/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz | tar -xz -C "$RUNNER_TEMP"
          sudo make -C "$RUNNER_TEMP/doxygen-${DOXYGEN_VERSION}" install
          doxygen --version

      - name: Configure with CMake (generates doxyfile from doxyfile.in)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build documentation
        run: doxygen build/doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
