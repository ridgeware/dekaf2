<script type="text/javascript">
/* doxygen >= 1.16 no longer ships jquery, but doxygen-awesome's init() (up to v2.4.2)
   still calls it - provide the tiny subset it uses: $(fn), $(document).ready(fn),
   $(window).resize(fn) */
if (typeof window.$ === 'undefined') {
    window.$ = function(arg) {
        if (typeof arg === 'function') {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', arg);
            } else {
                arg();
            }
        }
        return {
            ready:  function(fn) { window.$(fn); },
            resize: function(fn) { window.addEventListener('resize', fn); }
        };
    };
}
</script>

<script type="text/javascript">
/* the page outline labels every overload with just the member name - a class with
   17 constructors shows 17 identical entries. Number them cppreference-style and
   put the full signature into the tooltip. The panel is built by doxygen's own JS,
   so wait for it via MutationObserver.
   Also undo doxygen 1.17's navtree.js bug of assigning escapeHtml()ed names to
   textContent, which renders "operator+=" as "operator+&#x3D;". */
document.addEventListener('DOMContentLoaded', function() {
    const pageNav = document.getElementById('page-nav');
    if (!pageNav) return;

    const entities = {'&amp;':'&','&lt;':'<','&gt;':'>','&quot;':'"','&#x27;':"'",'&#x60;':'`','&#x3D;':'='};
    function decodeEntities(node) {
        const tn = node.firstChild;
        if (tn && tn.nodeType === Node.TEXT_NODE) {
            tn.nodeValue = tn.nodeValue.replace(/&(?:amp|lt|gt|quot|#x27|#x60|#x3D);/g, function(m) { return entities[m]; });
        }
    }

    function signatureFor(link) {
        const id = decodeURIComponent((link.hash || '').slice(1));
        let el = id ? document.getElementById(id) : null;
        for (let i = 0; el && i < 5; ++i) {
            if (el.classList && el.classList.contains('memitem')) break;
            el = el.nextElementSibling;
        }
        const proto = el && el.querySelector ? el.querySelector('.memproto') : null;
        return proto ? proto.textContent.replace(/\s+/g, ' ').trim() : '';
    }

    function disambiguate() {
        const groups = new Map();
        pageNav.querySelectorAll('ul.page-outline a[href*="#"]').forEach(function(a) {
            if (a.dataset.overloadTagged) return;
            decodeEntities(a);
            const name = a.textContent.trim();
            if (!groups.has(name)) groups.set(name, []);
            groups.get(name).push(a);
        });
        groups.forEach(function(links) {
            if (links.length < 2) return;
            links.forEach(function(a, i) {
                a.dataset.overloadTagged = '1';
                const idx = document.createElement('span');
                idx.style.opacity = '0.65';
                idx.textContent = ' (' + (i + 1) + ')';
                a.appendChild(idx);
                const sig = signatureFor(a);
                if (sig) a.title = sig;
            });
        });
    }

    new MutationObserver(disambiguate).observe(pageNav, {childList: true, subtree: true});
    disambiguate();

    // the same double-escape affects member names in the left class tree
    const sideNav = document.getElementById('side-nav');
    if (sideNav) {
        function decodeTree() {
            sideNav.querySelectorAll('a').forEach(decodeEntities);
        }
        new MutationObserver(decodeTree).observe(sideNav, {childList: true, subtree: true});
        decodeTree();
    }
});
</script>
